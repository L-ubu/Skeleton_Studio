<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#12123a"/>
      <stop offset="100%" stop-color="#06061a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0ffe8"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#bg)"/>
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="32" y="32" width="960" height="960" rx="215" ry="215" fill="none" stroke="#00ff8830" stroke-width="3"/>

  <!-- Hand skeleton -->
  <g filter="url(#neon)" transform="translate(512, 530) scale(1.05)">
    <!-- Palm base - wrist -->
    <circle cx="0" cy="160" r="16" fill="url(#bone)"/>

    <!-- Palm center -->
    <circle cx="0" cy="60" r="18" fill="url(#bone)"/>

    <!-- Wrist to palm -->
    <line x1="0" y1="160" x2="0" y2="60" stroke="url(#bone)" stroke-width="7" stroke-linecap="round"/>

    <!-- Palm spread connections -->
    <line x1="0" y1="60" x2="-95" y2="30" stroke="url(#bone)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="-45" y2="-10" stroke="url(#bone)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="15" y2="-15" stroke="url(#bone)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="70" y2="0" stroke="url(#bone)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="60" x2="110" y2="50" stroke="url(#bone)" stroke-width="6" stroke-linecap="round"/>

    <!-- Thumb (spread left) -->
    <circle cx="-95" cy="30" r="10" fill="url(#bone)"/>
    <line x1="-95" y1="30" x2="-135" y2="-20" stroke="url(#bone)" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="-135" cy="-20" r="9" fill="url(#bone)"/>
    <line x1="-135" y1="-20" x2="-160" y2="-70" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-160" cy="-70" r="11" fill="#00ff88" opacity="0.9"/>

    <!-- Index finger -->
    <circle cx="-45" cy="-10" r="10" fill="url(#bone)"/>
    <line x1="-45" y1="-10" x2="-60" y2="-100" stroke="url(#bone)" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="-60" cy="-100" r="9" fill="url(#bone)"/>
    <line x1="-60" y1="-100" x2="-68" y2="-170" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-68" cy="-170" r="8" fill="url(#bone)"/>
    <line x1="-68" y1="-170" x2="-72" y2="-225" stroke="url(#bone)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="-72" cy="-225" r="11" fill="#00ff88" opacity="0.9"/>

    <!-- Middle finger (tallest) -->
    <circle cx="15" cy="-15" r="10" fill="url(#bone)"/>
    <line x1="15" y1="-15" x2="12" y2="-110" stroke="url(#bone)" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="12" cy="-110" r="9" fill="url(#bone)"/>
    <line x1="12" y1="-110" x2="10" y2="-190" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="10" cy="-190" r="8" fill="url(#bone)"/>
    <line x1="10" y1="-190" x2="8" y2="-250" stroke="url(#bone)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="8" cy="-250" r="11" fill="#00ff88" opacity="0.9"/>

    <!-- Ring finger -->
    <circle cx="70" cy="0" r="10" fill="url(#bone)"/>
    <line x1="70" y1="0" x2="82" y2="-85" stroke="url(#bone)" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="82" cy="-85" r="9" fill="url(#bone)"/>
    <line x1="82" y1="-85" x2="88" y2="-155" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="88" cy="-155" r="8" fill="url(#bone)"/>
    <line x1="88" y1="-155" x2="92" y2="-210" stroke="url(#bone)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="92" cy="-210" r="11" fill="#00ff88" opacity="0.9"/>

    <!-- Pinky -->
    <circle cx="110" cy="50" r="10" fill="url(#bone)"/>
    <line x1="110" y1="50" x2="130" y2="-20" stroke="url(#bone)" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="130" cy="-20" r="9" fill="url(#bone)"/>
    <line x1="130" y1="-20" x2="142" y2="-75" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="142" cy="-75" r="8" fill="url(#bone)"/>
    <line x1="142" y1="-75" x2="150" y2="-120" stroke="url(#bone)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="150" cy="-120" r="11" fill="#00ff88" opacity="0.9"/>
  </g>

  <!-- Title text -->
  <text x="512" y="900" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="68" font-weight="bold" fill="#00ff88" filter="url(#glow-strong)" letter-spacing="8">SKELETON</text>
</svg>
